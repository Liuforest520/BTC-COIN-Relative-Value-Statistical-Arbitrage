data:
  symbols:
    BTCUSDT:
      exchange: binance
      timeframe: 1m
      path: data/BTCUSDT_kline_1m_20260201_20260706_20260706_150041.csv
      funding_path: data/binance_funding_rate_BTCUSDT_20260706_133637.csv
    COINUSDT:
      exchange: binance
      timeframe: 1m
      path: data/COINUSDT_kline_1m_20260209_20260706_20260706_150018.csv
      funding_path: data/binance_funding_rate_COINUSDT_20260706_134744.csv
  benchmarks: {}
backtest:
  initial_cash: 100000
pair:
  x_symbol: BTCUSDT
  y_symbol: COINUSDT
active_setup: cointegration_beta
setups:
  cointegration_fixed:
    signal: cointegration_zscore
    position_sizing: fixed_notional
    position_management: default
  cointegration_beta:
    signal: cointegration_zscore
    position_sizing: beta_neutral
    position_management: default
  cointegration_volatility:
    signal: cointegration_zscore
    position_sizing: volatility_neutral
    position_management: default
signals:
  cointegration_zscore:
    type: cointegration_zscore
    warmup_bars: 4320
    spread_model:
      regression_method: deming_returns
      deming_delta: 1.0
      lookback_bars: 4320
      update_interval_bars: 240
    hedge_model:
      regression_method: deming_returns
      deming_delta: 1.0
      lookback_bars: 1440
      update_interval_bars: 1
    entry_rule:
      method: rolling_quantile
      lookback_bars: 10080
      update_interval_bars: 60
      upper_percentile: 97.5
      lower_percentile: 2.5
      min_samples: 1440
      min_abs_entry_z: 2.0
      max_abs_entry_z: 5.0
    entry_filters:
      beta_stability:
        enabled: true
        lookback_bars: 1440
        max_cv: 0.1
        min_samples: 240
    zscore_lookback_bars: 1440
    entry_z: 2.0
    exit_z: 0.3
position_sizing:
  fixed_notional:
    method: fixed_notional
    notional: 10000
  beta_neutral:
    method: beta_neutral
    equity: 100000
    gross_exposure_ratio: 0.4
    max_gross_exposure_ratio: 1.0
  volatility_neutral:
    method: volatility_neutral
    equity: 100000
    gross_exposure_ratio: 0.2
    max_gross_exposure_ratio: 1.0
position_management:
  default:
    max_add_times: 2
    add_interval_bars: 60
    pending_timeout_bars: 5
cost:
  fee_rate: 0.0005
  slippage_bps: 1
  funding_enabled: true
risk:
  order_hedge_ratio_tolerance: 0.02
  position_hedge_ratio_tolerance: 0.05
  max_leverage: 1.0

